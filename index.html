<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Disponibilidade — Teatro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #f4f1eb;
    --surface:      #faf8f3;
    --surface2:     #ece8de;
    --border:       rgba(80,70,40,0.10);
    --border2:      rgba(80,70,40,0.18);
    --text:         #1e2a1a;
    --text-muted:   #6b7a5e;
    --text-dim:     #b0b89e;
    --moss:         #3d5a34;
    --moss-light:   #e8f0e2;
    --moss-border:  rgba(61,90,52,0.28);
    --terra:        #7a4e2d;
    --terra-light:  #f2e8df;
    --terra-border: rgba(122,78,45,0.22);
    --clay:         #a0622a;
    --leaf:         #5c7a3e;
    --today-bg:     #3d5a34;
    --today-text:   #f4f1eb;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  .texture-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233d5a34' fill-opacity='0.025'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .top-bar { background: var(--moss); height: 4px; width: 100%; }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 3rem 2rem 5rem;
  }

  header {
    display: flex; align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2.75rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border2);
    animation: fadeDown 0.55s ease both;
  }

  .eyebrow {
    font-size: 0.68rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--moss);
    font-weight: 500; margin-bottom: 0.4rem;
    display: flex; align-items: center; gap: 8px;
  }
  .eyebrow::before {
    content: ''; display: inline-block;
    width: 18px; height: 1.5px; background: var(--moss);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 500; color: var(--text);
    line-height: 1.15; letter-spacing: 0.01em;
  }

  .header-badge {
    background: var(--moss-light);
    border: 1px solid var(--moss-border);
    border-radius: 40px; padding: 6px 14px;
    font-size: 0.72rem; color: var(--moss);
    letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 400; white-space: nowrap;
  }

  .cal-controls {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    animation: fadeDown 0.55s 0.08s ease both;
  }

  .month-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 500; color: var(--text);
  }

  .nav-group { display: flex; gap: 6px; }

  .nav-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--surface); color: var(--text-muted);
    font-size: 0.9rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
  }
  .nav-btn:hover { background: var(--moss-light); border-color: var(--moss-border); color: var(--moss); }

  .legend {
    display: flex; gap: 20px; margin-bottom: 1.25rem;
    animation: fadeDown 0.55s 0.12s ease both;
  }
  .leg { display: flex; align-items: center; gap: 7px; font-size: 0.72rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .ld-free  { background: var(--leaf); }
  .ld-busy  { background: var(--terra-light); border: 1px solid var(--terra-border); }
  .ld-today { background: var(--today-bg); }

  .wdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 5px; margin-bottom: 5px;
    animation: fadeDown 0.55s 0.16s ease both;
  }
  .wday {
    text-align: center; font-size: 0.65rem;
    letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--text-dim); padding: 4px 0; font-weight: 400;
  }

  .days-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 5px; animation: fadeUp 0.5s 0.2s ease both;
  }

  .day {
    border-radius: 8px; min-height: 68px;
    padding: 8px 7px 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column;
    transition: border-color 0.18s, background 0.18s;
  }
  .day.empty { background: transparent; border-color: transparent; }
  .day.busy  { background: var(--terra-light); border-color: var(--terra-border); }
  .day.free  { background: var(--moss-light); border-color: var(--moss-border); }
  .day.today { border-color: var(--moss); border-width: 1.5px; }

  .day-num {
    font-size: 0.78rem; font-weight: 500;
    color: var(--text-muted);
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; flex-shrink: 0; margin-bottom: 4px;
  }
  .day.free  .day-num { color: var(--moss); }
  .day.busy  .day-num { color: var(--terra); }
  .day.today .day-num { background: var(--today-bg); color: var(--today-text); }

  .day-status {
    font-size: 0.62rem; letter-spacing: 0.07em;
    text-transform: uppercase; font-weight: 400;
    margin-top: auto; line-height: 1;
  }
  .day.free  .day-status { color: var(--leaf); }
  .day.busy  .day-status { color: var(--terra); opacity: 0.75; }

  .divider { height: 1px; background: var(--border2); margin: 2rem 0 1.75rem; animation: fadeUp 0.5s 0.3s ease both; }

  .section-label {
    font-size: 0.68rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 10px;
    animation: fadeUp 0.5s 0.32s ease both;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .events-list { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.5s 0.35s ease both; }

  .ev-row {
    display: flex; align-items: center; gap: 0;
    padding: 11px 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px;
    transition: background 0.15s;
  }
  .ev-row:hover { background: var(--surface2); }

  .ev-date-block { min-width: 52px; margin-right: 16px; }
  .ev-day-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 500;
    color: var(--clay); line-height: 1;
  }
  .ev-day-label { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }

  .ev-sep { width: 1px; height: 32px; background: var(--border2); margin-right: 16px; flex-shrink: 0; }

  .ev-info { flex: 1; }
  .ev-name { font-size: 0.88rem; color: var(--text); font-weight: 400; margin-bottom: 3px; }
  .ev-tag {
    display: inline-block; font-size: 0.6rem; letter-spacing: 0.1em;
    text-transform: uppercase; background: var(--terra-light);
    color: var(--terra); border-radius: 3px; padding: 2px 7px;
    border: 1px solid var(--terra-border);
  }

  .empty-msg {
    text-align: center; padding: 2rem; font-size: 0.85rem;
    color: var(--text-dim); font-style: italic;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  }
  .loading-msg {
    grid-column: 1/-1; text-align: center; padding: 2.5rem;
    font-size: 0.75rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--text-dim);
  }
  .error-msg {
    grid-column: 1/-1; text-align: center; padding: 2rem;
    font-size: 0.8rem; color: var(--terra);
    background: var(--terra-light); border: 1px solid var(--terra-border); border-radius: 8px;
  }

  footer {
    margin-top: 2.5rem; text-align: center;
    font-size: 0.68rem; letter-spacing: 0.1em;
    color: var(--text-dim); animation: fadeUp 0.5s 0.4s ease both;
  }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(8px);  } to { opacity:1; transform:translateY(0); } }

  @media (max-width: 580px) {
    .wrapper { padding: 2rem 1rem 3rem; }
    header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .day { min-height: 52px; padding: 6px 4px; }
    .day-status { display: none; }
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="texture-bg"></div>
<div class="wrapper">

  <header>
    <div class="header-left">
      <div class="eyebrow">Transparência pública</div>
      <h1>Disponibilidade<br>do Teatro</h1>
    </div>
    <div class="header-badge">Consulta aberta</div>
  </header>

  <div class="cal-controls">
    <div class="month-display" id="month-label">—</div>
    <div class="nav-group">
      <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Mês anterior">&#8592;</button>
      <button class="nav-btn" onclick="changeMonth(1)" aria-label="Próximo mês">&#8594;</button>
    </div>
  </div>

  <div class="legend">
    <div class="leg"><span class="leg-dot ld-free"></span> Disponível</div>
    <div class="leg"><span class="leg-dot ld-busy"></span> Ocupado</div>
    <div class="leg"><span class="leg-dot ld-today"></span> Hoje</div>
  </div>

  <div class="wdays">
    <div class="wday">Dom</div><div class="wday">Seg</div><div class="wday">Ter</div>
    <div class="wday">Qua</div><div class="wday">Qui</div><div class="wday">Sex</div>
    <div class="wday">Sáb</div>
  </div>

  <div class="days-grid" id="days-grid">
    <div class="loading-msg">Carregando calendário...</div>
  </div>

  <div class="divider"></div>
  <div class="section-label">Pauta de eventos do mês</div>
  <div class="events-list" id="event-list">
    <div class="empty-msg">Carregando...</div>
  </div>

  <footer>Atualizado em tempo real &middot; Dados públicos do teatro</footer>
</div>

<script>
const SHEET_ID     = '1ch-WCUQHRXgbAUdr7dPH7tcTRjQ9i3eoC4dFaIKKtJE';
const API_KEY      = 'AIzaSyAHx-VDQx39YNKGwmHJjRUSCfyMYXE8peI';
const MONTHS_PT    = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTHS_SHEET = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
const WDAYS_SHORT  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

const today   = new Date();
let   current = { year: today.getFullYear(), month: today.getMonth() };
const cache   = {};

async function fetchEvents(year, month) {
  const key = `${year}-${month}`;
  if (cache[key] !== undefined) return cache[key];

  const sheetName = `PAUTA ${MONTHS_SHEET[month]}`;
  const range     = `${encodeURIComponent(sheetName)}!A2:D`;
  const url       = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;

  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const rows = json.values || [];
    const events = [];

    rows.forEach(row => {
      const rawDate  = (row[0] || '').trim();
      const rawEvent = (row[3] || '').trim();
      if (!rawDate || !rawEvent) return;
      const parts = rawDate.split('/');
      if (parts.length < 2) return;
      const day = parseInt(parts[0], 10);
      const mon = parseInt(parts[1], 10) - 1;
      const yr  = parts.length === 3 ? parseInt(parts[2], 10) : year;
      if (!isNaN(day) && !isNaN(mon)) events.push({ day, month: mon, year: yr, name: rawEvent });
    });

    cache[key] = events;
    return events;
  } catch(e) {
    cache[key] = null;
    return null;
  }
}

async function render() {
  const { year, month } = current;
  document.getElementById('month-label').innerHTML =
    `${MONTHS_PT[month]} <span style="color:var(--text-muted);font-weight:300">${year}</span>`;

  const grid = document.getElementById('days-grid');
  const list = document.getElementById('event-list');
  grid.innerHTML = `<div class="loading-msg">Carregando calendário...</div>`;
  list.innerHTML = `<div class="empty-msg">Carregando...</div>`;

  const events = await fetchEvents(year, month);

  if (events === null) {
    grid.innerHTML = `<div class="error-msg">Não foi possível carregar os dados.<br>Verifique as permissões da planilha ou o nome das abas (esperado: PAUTA ${MONTHS_SHEET[month]}).</div>`;
    list.innerHTML = '';
    return;
  }

  const evMap = {};
  events.forEach(ev => {
    if (ev.month === month) {
      if (!evMap[ev.day]) evMap[ev.day] = [];
      evMap[ev.day].push(ev.name);
    }
  });

  const firstDay    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  grid.innerHTML = '';

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el      = document.createElement('div');
    const isBusy  = !!evMap[d];
    const isToday = year === today.getFullYear() && month === today.getMonth() && d === today.getDate();
    el.className  = 'day ' + (isBusy ? 'busy' : 'free') + (isToday ? ' today' : '');

    const num = document.createElement('div');
    num.className   = 'day-num';
    num.textContent = d;
    el.appendChild(num);

    const status = document.createElement('div');
    status.className   = 'day-status';
    status.textContent = isBusy ? 'Ocupado' : 'Livre';
    el.appendChild(status);

    grid.appendChild(el);
  }

  const monthEvents = events.filter(e => e.month === month);

  if (monthEvents.length === 0) {
    list.innerHTML = `<div class="empty-msg">Nenhum evento agendado neste mês.</div>`;
    return;
  }

  list.innerHTML = '';
  const seen = new Set();
  monthEvents.sort((a, b) => a.day - b.day).forEach(ev => {
    const k = `${ev.day}-${ev.name}`;
    if (seen.has(k)) return;
    seen.add(k);

    const dow = new Date(ev.year, ev.month, ev.day).getDay();
    const row = document.createElement('div');
    row.className = 'ev-row';
    row.innerHTML = `
      <div class="ev-date-block">
        <div class="ev-day-num">${String(ev.day).padStart(2,'0')}</div>
        <div class="ev-day-label">${WDAYS_SHORT[dow]}</div>
      </div>
      <div class="ev-sep"></div>
      <div class="ev-info">
        <div class="ev-name">${ev.name}</div>
        <span class="ev-tag">Agendado</span>
      </div>`;
    list.appendChild(row);
  });
}

function changeMonth(delta) {
  let { year, month } = current;
  month += delta;
  if (month > 11) { month = 0; year++; }
  if (month < 0)  { month = 11; year--; }
  current = { year, month };
  render();
}

render();
</script>
</body>
</html>
